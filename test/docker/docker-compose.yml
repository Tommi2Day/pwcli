name: pwcli
services:
  ldap:
    image: "cleanstart/openldap:2.6.12"
    restart: "no"
    hostname: "ldap.example.local"
    ports:
      - '1389:389'
      - '1636:636'
    volumes:
      - "./ldap/ldif:/ldif:ro"
      - "./ldap/certs:/certs:ro"
      - "./ldap/etc/slapd.conf:/etc/openldap/slapd.conf:ro"

  kms:
    image: "nsmithuk/local-kms:3.12.0"
    volumes:
      - ./kms/init:/init
    #  - kmsdata:/data
    ports:
      - "18080:8080"
    environment:
      - PORT=8080
      - KMS_ACCOUNT_ID=111122223333
      - KMS_REGION=eu-central-1
      - KMS_SEED_PATH=/init/seed.yaml
      - KMS_DATA_PATH=/data

  vault:
    image: "hashicorp/vault:1.21.4"
    volumes:
      - ./vault_provision:/vault_provision:ro
    restart: "no"
    ports:
      - '18200:8200'
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=pwcli-test
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - PGHOST=postgresql
      - PGPORT=5432
    cap_add:
      - IPC_LOCK
    depends_on:
      - postgresql

  postgresql:
    image: "postgres:18.3-bookworm"
    volumes:
      - ./postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: "no"
    ports:
      - '15432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

